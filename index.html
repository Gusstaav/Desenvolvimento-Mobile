<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página</title>
    
    <!-- Link para CSS -->
    <link rel="stylesheet" href="style.css">
</head>
    <body>
        <div class="container">
            <div class="title">
                 <h1>HamburgueriaZ</h1>
            </div>
            <div class="body">
                <p>Faça seu pedido</p>
                <input title="Nome" placeholder="Nome" />
            </div>
                <div class="list">
                    <div class="item">
                        <input class="bacon" type="checkbox"/>
                        <label for="bacon">Bacon</label>
                    </div>
                    <div class="item">
                        <input class="queijo" type="checkbox"/>
                        <label for="queijo">Queijo</label>
                    </div>
                    <div class="item">
                        <input class="orion-rings" type="checkbox"/>
                        <label for="orion-rings">Orion Rings</label>
                    </div>
                </div>

                    <div class="quantidade">
                        <p class="title-quantidade">Quantidade</p>
                        <div class="buttons">
                            <button class="button-subtrair">-</button>
                            <button class="button-adicionar">+</button>
                    </div>

                    <div class="resumo">
                        <p class="resumo-pedido">Resumo do pedido</p>
                        <p class="preco">Preço</p>
                        <button class="fazer-pedido">Fazer o Pedido</button>
                    </div>
                </div>
        </div>
       
       
    </body>
</html>
